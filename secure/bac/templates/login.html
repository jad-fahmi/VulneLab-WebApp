<!DOCTYPE html>
<html>
<head>
    <title>vulnlab-web - Secure Access Control</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a2e1a; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #162e16; padding: 40px; border-radius: 10px; width: 350px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #4ecca3; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; background: #0f3460; color: #eee; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4ecca3; border: none; border-radius: 5px; color: #1a1a1a; font-size: 16px; cursor: pointer; }
        .error { color: #e94560; text-align: center; }
        .hint { margin-top: 20px; padding: 10px; background: #0f3460; border-radius: 5px; font-size: 13px; color: #aaa; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Secure Access Control</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required/>
            <input type="password" name="password" placeholder="Password" required/>
            <button type="submit">Login</button>
        </form>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <div class="hint">
            Available users:<br>
            admin / admin123 (admin)<br>
            alice / password123 (user)<br>
            bob / letmein (user)
        </div>
    </div>
</body>
</html>
