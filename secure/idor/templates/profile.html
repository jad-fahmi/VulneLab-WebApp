<!DOCTYPE html>
<html>
<head>
    <title>vulnlab-web - Secure Profile</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a2e1a; color: #eee; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        h2 { color: #4ecca3; }
        .profile-box { background: #162e16; padding: 25px; border-radius: 10px; margin-top: 20px; }
        .field { margin: 12px 0; padding: 10px; background: #0f3460; border-radius: 5px; }
        .label { color: #aaa; font-size: 13px; }
        .value { font-size: 16px; margin-top: 3px; }
        .safe { background: #003d00; border: 1px solid #4ecca3; padding: 10px; border-radius: 5px; margin-bottom: 20px; color: #4ecca3; }
        .nav { display: flex; justify-content: space-between; align-items: center; }
        a { color: #4ecca3; }
        .hint { padding: 10px; background: #0f3460; border-radius: 5px; font-size: 13px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="nav">
        <h2> Secure Profile Viewer</h2>
        <a href="/logout">Logout</a>
    </div>

    <div class="safe">
         Profile loaded from server-side session — URL manipulation is ignored!
    </div>

    <div class="profile-box">
        <div class="field">
            <div class="label">Username</div>
            <div class="value">{{ user[1] }}</div>
        </div>
        <div class="field">
            <div class="label">Email</div>
            <div class="value">{{ user[2] }}</div>
        </div>
        <div class="field">
            <div class="label">Phone</div>
            <div class="value">{{ user[3] }}</div>
        </div>
        <div class="field">
            <div class="label">Address</div>
            <div class="value">{{ user[4] }}</div>
        </div>
        <div class="field">
            <div class="label">SSN</div>
            <div class="value">{{ user[5] }}</div>
        </div>
    </div>

    <div class="hint">
         <strong>Try adding</strong> <code>?id=2</code> or <code>?id=3</code> to the URL — you'll always see your own profile only!
    </div>
</body>
</html>
